<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trivandrum Reception 🧡</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:
    linear-gradient(
    135deg,
    #ff8c42,
    #ffb347,
    #fff1d6
    );

    overflow:hidden;
}

/* PALACE */

.palace{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    font-size:120px;
    text-align:center;
    opacity:.08;
    pointer-events:none;
}

/* FLOATING LANTERNS */

.lanterns span{

    position:absolute;

    bottom:-50px;

    font-size:35px;

    animation:
    lanternFloat linear infinite;
}

.lanterns span::before{
    content:"🏮";
}

.lanterns span:nth-child(1){
    left:10%;
    animation-duration:12s;
}

.lanterns span:nth-child(2){
    left:30%;
    animation-duration:15s;
}

.lanterns span:nth-child(3){
    left:50%;
    animation-duration:10s;
}

.lanterns span:nth-child(4){
    left:70%;
    animation-duration:18s;
}

.lanterns span:nth-child(5){
    left:90%;
    animation-duration:13s;
}

@keyframes lanternFloat{

    from{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* CARD */

.detail-card{

    max-width:750px;

    margin:70px auto;

    padding:45px;

    background:
    rgba(255,255,255,.18);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.4);

    border-radius:35px;

    text-align:center;

    color:#5c2c00;

    box-shadow:
    0 15px 40px rgba(0,0,0,.15);

    animation:
    cardEnter 1s ease;
}

.detail-card h1{

    font-size:3rem;

    color:#c96f00;

    margin-bottom:20px;

    animation:
    palaceGlow 3s infinite alternate;
}

.divider{

    color:#c96f00;

    margin-bottom:25px;

    font-size:1.3rem;

    letter-spacing:12px;
}

.detail-card p{

    font-size:1.2rem;

    margin:18px 0;
}

/* BUTTONS */

.back-btn,
.map-btn{

    display:inline-block;

    margin-top:25px;

    margin-right:10px;

    padding:14px 26px;

    border-radius:50px;

    text-decoration:none;

    font-weight:bold;

    color:white;

    background:#c96f00;

    transition:.3s;
}

.back-btn:hover,
.map-btn:hover{

    transform:
    translateY(-4px);

    box-shadow:
    0 0 20px rgba(201,111,0,.5);
}

/* ANIMATIONS */

@keyframes cardEnter{

    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes palaceGlow{

    from{
        text-shadow:
        0 0 10px rgba(201,111,0,.3);
    }

    to{
        text-shadow:
        0 0 30px rgba(201,111,0,.9);
    }
}

</style>

</head>

<body>

<div class="palace">🏰</div>

<div class="lanterns">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="container">

<div class="detail-card">

<h1>🧡 Trivandrum Reception</h1>

<div class="divider">❈ ❈ ❈</div>

<p><strong>Date:</strong> 6 August (Thursday)</p>

<p><strong>Time:</strong> 5 PM</p>

<p><strong>Location:</strong> Udaya Palace Convention Centre</p>

<p><strong>Dress Code:</strong> Your Wish ✨</p>

<a href="index.html" class="back-btn">
← Home
</a>

<a href="#" class="map-btn">
📍 Open Maps
</a>

</div>

</div>

</body>
</html>
