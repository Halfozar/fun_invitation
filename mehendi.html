<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mehendi 🎇</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:linear-gradient(
        135deg,
        #ffecd2,
        #fcb69f,
        #fff5e4
    );
    overflow:hidden;
}

/* FLOATING LANTERNS */

.lanterns{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.lanterns span{
    position:absolute;
    bottom:-100px;
    font-size:40px;
    animation:floatLantern linear infinite;
}

.lanterns span::before{
    content:"🏮";
}

.lanterns span:nth-child(1){
    left:10%;
    animation-duration:15s;
}

.lanterns span:nth-child(2){
    left:30%;
    animation-duration:18s;
}

.lanterns span:nth-child(3){
    left:50%;
    animation-duration:14s;
}

.lanterns span:nth-child(4){
    left:70%;
    animation-duration:20s;
}

.lanterns span:nth-child(5){
    left:90%;
    animation-duration:16s;
}

@keyframes floatLantern{
    from{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* CARD */

.detail-card{

    max-width:700px;

    margin:60px auto;

    padding:40px;

    background:rgba(255,255,255,.80);

    backdrop-filter:blur(15px);

    border-radius:35px;

    text-align:center;

    box-shadow:
    0 15px 35px rgba(0,0,0,.12);

    animation:cardEnter 1s ease;
}

.detail-card h1{

    font-size:3rem;

    color:#ff7b00;

    margin-bottom:25px;

    animation:glowTitle 2.5s infinite alternate;
}

.detail-card p{

    font-size:1.2rem;

    margin:18px 0;

    color:#444;
}

/* BUTTONS */

.back-btn,
.map-btn{

    display:inline-block;

    margin-top:25px;

    margin-right:10px;

    padding:14px 26px;

    border-radius:50px;

    text-decoration:none;

    font-weight:bold;

    color:white;

    background:#ff7b00;

    transition:.3s;
}

.back-btn:hover,
.map-btn:hover{

    transform:translateY(-4px);

    box-shadow:
    0 10px 20px rgba(255,123,0,.4);
}

/* ANIMATIONS */

@keyframes cardEnter{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes glowTitle{

    from{
        text-shadow:
        0 0 5px rgba(255,123,0,.3);
    }

    to{
        text-shadow:
        0 0 25px rgba(255,123,0,.8);
    }
}

</style>

</head>

<body>

<div class="lanterns">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">

<div class="detail-card">

<h1>🎇 Mehendi</h1>

<p><strong>Date:</strong> 28 July (Tuesday)</p>

<p><strong>Time:</strong> 5 PM</p>

<p><strong>Location:</strong> Sargalaya</p>

<p><strong>Dress Code:</strong> Your Wish ✨</p>

<a href="index.html" class="back-btn">
← Home
</a>

<a href="#" class="map-btn">
📍 Open Maps
</a>

</div>

</div>

</body>
</html>
