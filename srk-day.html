<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shah Rukh Khan Day 😎</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:
    linear-gradient(
    135deg,
    #000000,
    #1a1a1a,
    #2b2b2b
    );

    overflow:hidden;
}

/* SPOTLIGHTS */

body::before{
    content:"";

    position:fixed;
    inset:0;

    background:
    linear-gradient(
    70deg,
    transparent 40%,
    rgba(255,255,255,.08) 50%,
    transparent 60%
    );

    animation:
    spotlightMove 6s ease-in-out infinite alternate;

    pointer-events:none;
}

@keyframes spotlightMove{

    from{
        transform:translateX(-300px);
    }

    to{
        transform:translateX(300px);
    }
}

/* SUNGLASSES */

.glasses span{

    position:absolute;

    top:-80px;

    font-size:35px;

    animation:
    glassesFall linear infinite;
}

.glasses span::before{
    content:"🕶️";
}

.glasses span:nth-child(1){
    left:10%;
    animation-duration:10s;
}

.glasses span:nth-child(2){
    left:25%;
    animation-duration:13s;
}

.glasses span:nth-child(3){
    left:40%;
    animation-duration:9s;
}

.glasses span:nth-child(4){
    left:60%;
    animation-duration:15s;
}

.glasses span:nth-child(5){
    left:80%;
    animation-duration:11s;
}

@keyframes glassesFall{

    from{
        transform:
        translateY(-100px)
        rotate(0deg);
    }

    to{
        transform:
        translateY(120vh)
        rotate(720deg);
    }
}

/* CONFETTI */

.confetti span{

    position:absolute;

    bottom:-50px;

    font-size:22px;

    animation:
    confettiFloat linear infinite;
}

.confetti span::before{
    content:"✨";
}

.confetti span:nth-child(1){
    left:15%;
    animation-duration:8s;
}

.confetti span:nth-child(2){
    left:35%;
    animation-duration:12s;
}

.confetti span:nth-child(3){
    left:55%;
    animation-duration:10s;
}

.confetti span:nth-child(4){
    left:75%;
    animation-duration:14s;
}

@keyframes confettiFloat{

    from{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* CARD */

.detail-card{

    max-width:750px;

    margin:70px auto;

    padding:45px;

    background:
    rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,215,0,.25);

    border-radius:35px;

    text-align:center;

    color:white;

    box-shadow:
    0 15px 40px rgba(0,0,0,.5);

    animation:
    heroEntry 1.2s ease;
}

.detail-card h1{

    font-size:3.5rem;

    color:#ffd700;

    margin-bottom:20px;

    animation:
    srkGlow 2s infinite alternate;
}

.detail-card p{

    font-size:1.2rem;

    margin:18px 0;
}

/* BUTTONS */

.back-btn,
.map-btn{

    display:inline-block;

    margin-top:25px;

    margin-right:10px;

    padding:14px 26px;

    border-radius:50px;

    text-decoration:none;

    font-weight:bold;

    color:black;

    background:#ffd700;

    transition:.3s;
}

.back-btn:hover,
.map-btn:hover{

    transform:
    translateY(-4px);

    box-shadow:
    0 0 20px rgba(255,215,0,.9);
}

/* ANIMATIONS */

@keyframes heroEntry{

    from{
        opacity:0;
        transform:
        scale(.7)
        translateY(50px);
    }

    to{
        opacity:1;
        transform:
        scale(1)
        translateY(0);
    }
}

@keyframes srkGlow{

    from{
        text-shadow:
        0 0 10px rgba(255,215,0,.4);
    }

    to{
        text-shadow:
        0 0 30px rgba(255,215,0,1);
    }
}

</style>

</head>

<body>

<div class="glasses">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<span></span>
<span></span>
<span></span>
<span></span>
</div>

</div>

</body>
</html>
