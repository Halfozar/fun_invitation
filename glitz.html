<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Glitz ✨</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:linear-gradient(
        135deg,
        #120022,
        #240046,
        #3c096c
    );
    overflow:hidden;
}

/* DISCO LIGHTS */

body::before{
    content:"";

    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at 20% 30%, rgba(255,0,255,.25), transparent 30%),
    radial-gradient(circle at 80% 20%, rgba(0,255,255,.25), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,255,0,.2), transparent 30%);

    animation:moveLights 8s infinite alternate;
    pointer-events:none;
}

@keyframes moveLights{
    from{
        transform:translateX(-50px);
    }

    to{
        transform:translateX(50px);
    }
}

/* GLITTER */

.sparkle{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.sparkle span{
    position:absolute;
    bottom:-50px;
    font-size:24px;
    animation:glitterFloat linear infinite;
}

.sparkle span::before{
    content:"✨";
}

.sparkle span:nth-child(1){left:10%; animation-duration:8s;}
.sparkle span:nth-child(2){left:25%; animation-duration:12s;}
.sparkle span:nth-child(3){left:40%; animation-duration:10s;}
.sparkle span:nth-child(4){left:60%; animation-duration:14s;}
.sparkle span:nth-child(5){left:80%; animation-duration:9s;}

@keyframes glitterFloat{

    from{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    50%{
        opacity:1;
        transform:scale(1);
    }

    to{
        transform:translateY(-120vh) scale(0);
        opacity:0;
    }
}

/* CARD */

.detail-card{
    max-width:700px;
    margin:60px auto;
    padding:40px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);

    border-radius:35px;

    text-align:center;

    border:1px solid rgba(255,255,255,.2);

    box-shadow:0 15px 35px rgba(0,0,0,.3);

    animation:cardEnter 1s ease;
}

.detail-card h1{
    font-size:3rem;
    color:white;

    animation:neonGlow 2s infinite alternate;
}

.detail-card p{
    font-size:1.2rem;
    margin:18px 0;
    color:white;
}

/* BUTTONS */

.back-btn,
.map-btn{

    display:inline-block;

    margin-top:25px;
    margin-right:10px;

    padding:14px 26px;

    border-radius:50px;

    text-decoration:none;

    font-weight:bold;

    color:white;

    background:#ff00ff;

    transition:.3s;
}

.back-btn:hover,
.map-btn:hover{
    transform:translateY(-4px);

    box-shadow:
    0 0 20px #ff00ff;
}

/* ANIMATIONS */

@keyframes cardEnter{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes neonGlow{

    from{
        text-shadow:
        0 0 10px #ff00ff;
    }

    to{
        text-shadow:
        0 0 25px #00ffff,
        0 0 40px #ff00ff;
    }
}

</style>

</head>

<body>

<div class="sparkle">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">

<div class="detail-card">

<h1>🕺 Glitz ✨</h1>

<p><strong>Date:</strong> 26 July (Sunday)</p>

<p><strong>Time:</strong> 7 PM – 11 PM</p>

<p><strong>Location:</strong> Theeram Roof Garden</p>

<p><strong>Dress Code:</strong> Shiny / Sparkling / Sequined Clothes ✨</p>

<a href="index.html" class="back-btn">
← Home
</a>

<a href="#" class="map-btn">
📍 Open Maps
</a>

</div>

</div>

</body>
</html>
