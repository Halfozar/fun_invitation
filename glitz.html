<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Glitz</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

<style>

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81);

color:white;

overflow-x:hidden;

}

/* Floating Sparkles */

.sparkles{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

z-index:-1;

}

.sparkles span{

position:absolute;

font-size:18px;

animation:float 10s linear infinite;

opacity:.8;

}

.sparkles span:nth-child(1){

left:10%;

animation-delay:0s;

}

.sparkles span:nth-child(2){

left:25%;

animation-delay:2s;

}

.sparkles span:nth-child(3){

left:45%;

animation-delay:4s;

}

.sparkles span:nth-child(4){

left:70%;

animation-delay:1s;

}

.sparkles span:nth-child(5){

left:88%;

animation-delay:3s;

}

@keyframes float{

0%{

transform:translateY(100vh) rotate(0deg);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120px) rotate(360deg);

opacity:0;

}

}

.detail-container{

max-width:900px;

margin:60px auto;

padding:25px;

}

.detail-card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

border-radius:35px;

padding:40px;

text-align:center;

box-shadow:

0 20px 45px rgba(0,0,0,.35);

animation:fadeUp .8s ease;

}

.detail-image{

width:100%;

max-width:700px;

height:380px;

margin:auto;

overflow:hidden;

border-radius:30px;

box-shadow:

0 20px 40px rgba(0,0,0,.4);

}

.detail-image img{

width:100%;

height:100%;

object-fit:cover;

transition:.5s;

}

.detail-image img:hover{

transform:scale(1.05);

}

.detail-card h1{

font-family:'Cormorant Garamond',serif;

font-size:3.3rem;

margin:30px 0;

color:#ffd166;

text-shadow:

0 0 20px rgba(255,209,102,.5);

}

.info-box{

text-align:left;

margin:35px auto;

max-width:650px;

}

.info-box p{

font-size:1.08rem;

margin:18px 0;

line-height:1.8;

color:#ececec;

}

.info-box strong{

color:#ffd166;

}

.program-list{

margin-top:8px;

padding-left:28px;

color:#ececec;

}

.program-list li{

margin:8px 0;

}

.home-btn{

display:inline-block;

margin-top:30px;

padding:15px 35px;

background:

linear-gradient(
135deg,
#ffd166,
#f4a261);

color:#1e293b;

text-decoration:none;

border-radius:50px;

font-weight:700;

transition:.35s;

}

.home-btn:hover{

transform:

translateY(-5px)
scale(1.05);

box-shadow:

0 0 30px rgba(255,209,102,.5);

}

</style>

</head>

<body>

<div class="sparkles">

<span>✨</span>
<span>⭐</span>
<span>✨</span>
<span>⭐</span>
<span>✨</span>

</div>

<div class="detail-container">

<div class="detail-card">

<div class="detail-image">

<img src="images\WhatsApp Image 2026-06-29 at 20.29.21.jpeg" alt="Glitz">

</div>

<h1>✨ Glitz ✨</h1>

<div class="info-box">

<p><strong>📅 Date :</strong> 26th July</p>

<p><strong>🕖 Time :</strong> 7:00 PM – 11:00 PM</p>

<p><strong>📍 Venue :</strong> Theeram Roof Garden</p>

<p><strong>🎭 Programs :</strong></p>

<ul class="program-list">

<li>Games</li>

<li>Dance</li>

</ul>

<p><strong>✨ Dress Code :</strong> Sequined, Glittery & Shimmery</p>

</div>

<a href="index.html" class="home-btn">

🏠 Back to Home

</a>

</div>

</div>

</body>

</html>
