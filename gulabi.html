<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gulabi</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

<style>

body{

background:linear-gradient(
135deg,
#fff8fc,
#fff1f6,
#ffeaf1);

}

.detail-container{

max-width:900px;

margin:60px auto;

padding:25px;

}

.detail-card{

background:rgba(255,255,255,.82);

backdrop-filter:blur(18px);

border-radius:35px;

padding:40px;

box-shadow:0 20px 45px rgba(0,0,0,.08);

text-align:center;

animation:fadeUp .8s ease;

}

.detail-image{

width:100%;

max-width:700px;

height:380px;

margin:auto;

overflow:hidden;

border-radius:28px;

box-shadow:0 15px 30px rgba(0,0,0,.12);

}

.detail-image img{

width:100%;

height:100%;

object-fit:cover;

transition:.5s;

}

.detail-image img:hover{

transform:scale(1.05);

}

.detail-card h1{

font-family:'Cormorant Garamond',serif;

font-size:3.2rem;

margin:30px 0;

color:#d46a93;

}

.info-box{

text-align:left;

margin:35px auto;

max-width:650px;

}

.info-box p{

font-size:1.08rem;

margin:18px 0;

line-height:1.8;

}

.info-box strong{

color:#d46a93;

}

.program-list{

margin-top:8px;

padding-left:28px;

}

.program-list li{

margin:8px 0;

}

.home-btn{

display:inline-block;

margin-top:25px;

padding:15px 35px;

background:#d46a93;

color:white;

text-decoration:none;

border-radius:40px;

font-weight:600;

transition:.35s;

}

.home-btn:hover{

transform:translateY(-5px);

box-shadow:0 15px 30px rgba(212,106,147,.35);

}

</style>

</head>

<body>

<div class="detail-container">

<div class="detail-card">

<div class="detail-image">

<img src="images\WhatsApp Image 2026-06-29 at 20.10.15.jpeg" alt="Gulabi">

</div>

<h1>🌹 Gulabi</h1>

<div class="info-box">

<p><strong>📅 Date :</strong> 26th July</p>

<p><strong>🕚 Time :</strong> 11:00 AM – 2:00 PM</p>

<p><strong>📍 Venue :</strong> Afiyath</p>

<p><strong>🎭 Programs :</strong></p>

<ul class="program-list">

<li>Gulabi Ceremony</li>

<li>Dolki</li>

<li>Girls Cousins Dance Performances</li>

</ul>

<p><strong>🌸 Dress Code :</strong> Light Shades / Pastels</p>

</div>

<a href="index.html" class="home-btn">🏠 Back to Home</a>

</div>

</div>

</body>

</html>
