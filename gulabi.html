<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gulabi 🌹</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background: linear-gradient(
        135deg,
        #fff5f7,
        #ffeef4,
        #fff9fb
    );
    overflow:hidden;
}

/* Falling Roses */

.petals{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}

.petals span{
    position:absolute;
    top:-50px;
    font-size:28px;
    animation:petalFall linear infinite;
}

.petals span::before{
    content:"🌹";
}

.petals span:nth-child(1){
    left:10%;
    animation-duration:9s;
}

.petals span:nth-child(2){
    left:25%;
    animation-duration:12s;
}

.petals span:nth-child(3){
    left:40%;
    animation-duration:10s;
}

.petals span:nth-child(4){
    left:55%;
    animation-duration:14s;
}

.petals span:nth-child(5){
    left:70%;
    animation-duration:11s;
}

.petals span:nth-child(6){
    left:85%;
    animation-duration:13s;
}

@keyframes petalFall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }

    to{
        transform:translateY(120vh) rotate(360deg);
    }
}

/* Main Card */

.detail-card{
    max-width:700px;
    margin:60px auto;
    padding:40px;

    background:rgba(255,255,255,.75);
    backdrop-filter:blur(15px);

    border-radius:35px;

    text-align:center;

    box-shadow:0 15px 35px rgba(0,0,0,.12);

    animation:cardEnter 1s ease;
}

.detail-card h1{
    font-size:3rem;
    margin-bottom:25px;
    color:#d35d84;

    animation:glowTitle 3s infinite alternate;
}

.detail-card p{
    font-size:1.25rem;
    margin:18px 0;
    color:#444;
}

/* Buttons */

.back-btn,
.map-btn{
    display:inline-block;

    margin-top:25px;
    margin-right:10px;

    padding:14px 26px;

    border-radius:50px;

    text-decoration:none;

    font-weight:bold;

    color:white;

    background:#d35d84;

    transition:.3s;
}

.back-btn:hover,
.map-btn:hover{
    transform:translateY(-3px);

    box-shadow:
    0 10px 20px rgba(211,93,132,.3);
}

/* Animations */

@keyframes cardEnter{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes glowTitle{

    from{
        text-shadow:
        0 0 5px rgba(211,93,132,.3);
    }

    to{
        text-shadow:
        0 0 20px rgba(211,93,132,.8);
    }
}

</style>

</head>

<body>

<div class="petals">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">

    <div class="detail-card">

        <h1>🌹 Gulabi</h1>

        <p><strong>Date:</strong> 26 July (Sunday)</p>

        <p><strong>Time:</strong> 11 AM – 2 PM</p>

        <p><strong>Location:</strong> Afiyath Terrace</p>

        <p><strong>Dress Code:</strong> Only pastel / light colours ✨</p>

        <a href="index.html" class="back-btn">
            ← Home
        </a>

        <a href="#" class="map-btn">
            📍 Open Maps
        </a>

    </div>

</div>

</body>
</html>
